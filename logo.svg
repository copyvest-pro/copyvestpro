  <text x="50" y="28" font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" font-weight="800" fill="rgba(255,255,255,0.92)">
    Copy<tspan fill="url(#g)">Vest</tspan>Pro
