    <path d="M12 29V23M18 29V19M24 29V15M30 29V11" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <path d="M11 21L18 17L24 19L31 13" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round"/>
    <path d="M31 13l-2 0.5 0.6-1.9" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

